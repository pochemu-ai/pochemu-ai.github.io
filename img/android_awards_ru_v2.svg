    <text class="text" x="90" y="58">редакторов</text>
  </g>

  <!-- Divider Line -->
  <line x1="245" y1="15" x2="245" y2="65" stroke="#333639" stroke-width="2"/>

  <!-- Right Laurel Wreath Group (Best AI App / Лучшее AI-приложение) -->
  <g transform="translate(265, 0)">
    <!-- Laurel Wreath Leaves (Left Side) -->
    <path class="leaf" d="M 28,62 C 20,62 14,56 12,50 C 13,44 19,42 24,45 C 25,50 27,57 28,62 Z"/>
