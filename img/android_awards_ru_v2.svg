    <path class="leaf" d="M 28,62 C 20,62 14,56 12,50 C 13,44 19,42 24,45 C 25,50 27,57 28,62 Z"/>
    <path class="leaf" d="M 24,47 C 16,45 10,38 9,31 C 11,25 18,24 21,28 C 21,34 23,41 24,47 Z"/>
    <path class="leaf" d="M 23,31 C 17,27 13,19 14,12 C 18,7 24,8 25,13 C 24,19 24,25 23,31 Z"/>
    
