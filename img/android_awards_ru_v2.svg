    <path class="leaf" d="M 56,47 C 64,45 70,38 71,31 C 69,25 62,24 59,28 C 59,34 57,41 56,47 Z"/>
    <path class="leaf" d="M 57,31 C 63,27 67,19 66,12 C 62,7 56,8 55,13 C 56,19 56,25 57,31 Z"/>
    
