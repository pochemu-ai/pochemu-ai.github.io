<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 80" width="500" height="80">
  <style>
    .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #8a8d90; }
    .title { font-size: 18px; font-weight: bold; fill: #ffffff; }
    .icon { fill: #8a8d90; }
  </style>

  <!-- Left Laurel Wreath Group (Editors' Choice / Выбор редакторов) -->
  <g transform="translate(10, 0)">
    <!-- Laurel Wreath Left Branch -->
    <path d="M 40,70 C 25,60 20,40 25,20 M 25,20 C 15,22 10,30 15,35 M 25,32 C 12,35 8,42 16,47 M 27,45 C 14,50 10,60 20,62 M 31,58 C 20,65 18,73 28,73" fill="none" stroke="#8a8d90" stroke-width="2" stroke-linecap="round"/>
    <!-- Laurel Wreath Right Branch -->
    <path d="M 50,70 C 65,60 70,40 65,20 M 65,20 C 75,22 80,30 75,35 M 65,32 C 78,35 82,42 74,47 M 63,45 C 76,50 80,60 70,62 M 59,58 C 70,65 72,73 62,73" fill="none" stroke="#8a8d90" stroke-width="2" stroke-linecap="round"/>
    <!-- Star Icon in center of wreath -->
    <path class="icon" d="M 45,35 L 48,41 L 55,42 L 50,47 L 51,54 L 45,50 L 39,54 L 40,47 L 35,42 L 42,41 Z"/>
    
    <!-- Text -->
    <text class="text" x="90" y="38">Выбор</text>
    <text class="text" x="90" y="58">редакторов</text>
  </g>

  <!-- Divider Line -->
  <line x1="240" y1="15" x2="240" y2="65" stroke="#333639" stroke-width="2"/>

  <!-- Right Laurel Wreath Group (Best AI App / Лучшее AI-приложение) -->
  <g transform="translate(255, 0)">
    <!-- Laurel Wreath Left Branch -->
    <path d="M 40,70 C 25,60 20,40 25,20 M 25,20 C 15,22 10,30 15,35 M 25,32 C 12,35 8,42 16,47 M 27,45 C 14,50 10,60 20,62 M 31,58 C 20,65 18,73 28,73" fill="none" stroke="#8a8d90" stroke-width="2" stroke-linecap="round"/>
    <!-- Laurel Wreath Right Branch -->
    <path d="M 50,70 C 65,60 70,40 65,20 M 65,20 C 75,22 80,30 75,35 M 65,32 C 78,35 82,42 74,47 M 63,45 C 76,50 80,60 70,62 M 59,58 C 70,65 72,73 62,73" fill="none" stroke="#8a8d90" stroke-width="2" stroke-linecap="round"/>
    <!-- Android Head Icon in center of wreath -->
    <path class="icon" d="M 45,30 C 41,30 38,33 38,37 L 52,37 C 52,33 49,30 45,30 Z M 40,33 A 1,1 0 1,1 39,33 A 1,1 0 1,1 40,33 Z M 50,33 A 1,1 0 1,1 49,33 A 1,1 0 1,1 50,33 Z M 38,39 L 52,39 L 52,47 C 52,49 50,51 48,51 L 42,51 C 40,51 38,49 38,47 Z M 42,51 L 42,55 M 48,51 L 48,55" stroke="#8a8d90" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Text -->
    <text class="text" x="90" y="38">Лучшее AI</text>
    <text class="text" x="90" y="58">приложение</text>
  </g>
</svg>